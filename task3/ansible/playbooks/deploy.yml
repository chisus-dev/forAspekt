- name: Prepare task3 host paths on Swarm workers
  hosts: swarm_workers
  become: true
  gather_facts: false

  vars:
    task3_remote_dir: /opt/foraspekt/task3
    task3_log_dir: /var/log/foraspekt/task3/ubuntu-client

  tasks:
    - name: Create task3 log directory on worker nodes
      ansible.builtin.file:
        path: "{{ task3_log_dir }}"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Copy connectivity check script to worker log directory
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../../scripts/check-connectivity.sh"
        dest: "{{ task3_log_dir }}/check-connectivity.sh"
        owner: root
        group: root
        mode: "0755"

    - name: Create task3 scripts directory on worker nodes
      ansible.builtin.file:
        path: "{{ task3_remote_dir }}/scripts"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Copy task3 container exec helper to worker nodes
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../../scripts/exec-client.sh"
        dest: "{{ task3_remote_dir }}/scripts/exec-client.sh"
        owner: root
        group: root
        mode: "0755"

- name: Deploy task3 Docker Swarm stack
  hosts: swarm_managers
  become: true
  gather_facts: false

  vars:
    task3_remote_dir: /opt/foraspekt/task3

  tasks:
    - name: Create task3 remote directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ task3_remote_dir }}"
        - "{{ task3_remote_dir }}/compose"
        - "{{ task3_remote_dir }}/scripts"

    - name: Copy task3 compose file
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../../compose/docker-compose.yml"
        dest: "{{ task3_remote_dir }}/compose/docker-compose.yml"
        mode: "0644"

    - name: Copy task3 test dependencies compose file
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../../compose/test-dependencies.yml"
        dest: "{{ task3_remote_dir }}/compose/test-dependencies.yml"
        mode: "0644"

    - name: Copy task3 manager scripts
      ansible.builtin.copy:
        src: "{{ item }}"
        dest: "{{ task3_remote_dir }}/scripts/{{ item | basename }}"
        mode: "0755"
      loop:
        - "{{ playbook_dir }}/../../scripts/ensure-networks.sh"
        - "{{ playbook_dir }}/../../scripts/deploy.sh"
        - "{{ playbook_dir }}/../../scripts/remove.sh"
        - "{{ playbook_dir }}/../../scripts/status.sh"
        - "{{ playbook_dir }}/../../scripts/deploy-test-deps.sh"
        - "{{ playbook_dir }}/../../scripts/remove-test-deps.sh"

    - name: Deploy task3 stack
      ansible.builtin.command:
        cmd: "{{ task3_remote_dir }}/scripts/deploy.sh"
        chdir: "{{ task3_remote_dir }}"
      changed_when: true